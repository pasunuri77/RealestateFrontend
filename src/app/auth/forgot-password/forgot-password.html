<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo-icon">🔒</span>
      <h2>Forgot Password</h2>
      <p>Enter your registered email address. We'll send a verification code to reset your password.</p>
    </div>

    @if (errorMessage) {
      <div class="error-alert">{{ errorMessage }}</div>
    }

    @if (successMessage) {
      <div class="success-alert">{{ successMessage }}</div>
    }

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="name&#64;company.com" 
          [class.error]="isFieldInvalid('email')"
        />
        @if (isFieldInvalid('email')) {
          <span class="error-msg">A valid email is required</span>
        }
      </div>

      <button type="submit" class="btn-submit" [disabled]="forgotForm.invalid || isLoading">
        @if (isLoading) {
          <span>Sending OTP...</span>
        } @else {
          <span>Send OTP</span>
        }
      </button>
    </form>

    <div class="auth-footer">
      <p>Remember your password? <a routerLink="/auth/login">Back to Login</a></p>
    </div>
  </div>
</div>
