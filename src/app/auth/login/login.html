<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo-icon">🏢</span>
      <h2>Welcome Back</h2>
      <p>Sign in to your RealEstate Constructor account</p>
    </div>

    @if (errorMessage) {
      <div class="error-alert">{{ errorMessage }}</div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          placeholder="name&#64;company.com" 
          [class.error]="isFieldInvalid('email')"
        />
        @if (isFieldInvalid('email')) {
          <span class="error-msg">A valid email is required</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          placeholder="••••••••" 
          [class.error]="isFieldInvalid('password')"
        />
        @if (isFieldInvalid('password')) {
          <span class="error-msg">Password is required</span>
        }
        <div class="forgot-password-container">
          <a routerLink="/forgot-password" class="forgot-link">Forgot Password?</a>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loginForm.invalid || isLoading">
        @if (isLoading) {
          <span>Signing in...</span>
        } @else {
          <span>Sign In</span>
        }
      </button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/auth/register">Create one</a></p>
    </div>
  </div>
</div>
